name: Build and Push

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allow manual trigger
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract upstream OpenClaw version
        id: upstream
        run: |
          # Parse the upstream version from the FROM line, e.g. 2026.3.24-slim
          # Strip the digest (e.g. @sha256:...) if present so the tag stays clean
          VERSION=$(grep -m1 '^FROM ghcr.io/openclaw/openclaw:' Dockerfile \
            | sed 's|FROM ghcr.io/openclaw/openclaw:||' \
            | sed 's|@sha256:.*||')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag scheme:
          #   latest                            -> floating, default branch
          #   <upstream>                        -> floating, latest build on this upstream (e.g. 2026.4.15-slim)
          #   <upstream>-<run_number>           -> immutable, pin this in production (e.g. 2026.4.15-slim-42)
          #   <short-sha>                       -> immutable, pinned to source commit
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.upstream.outputs.version }},enable={{is_default_branch}}
            type=raw,value=${{ steps.upstream.outputs.version }}-${{ github.run_number }},enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
